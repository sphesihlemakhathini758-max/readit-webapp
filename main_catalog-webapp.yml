name: Build and deploy ASP.NET Core app to Azure Web App - catalog-webapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # Build
      - name: Build project
        run: dotnet build "catalog-baseline-01 (1)/catalog/catalog.csproj" --configuration Release

      # Publish
      - name: Publish project
        run: dotnet publish "catalog-baseline-01 (1)/catalog/catalog.csproj" -c Release -o ./publish

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: catalog-webapp
          slot-name: Production
          package: ./publish
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_035E1ACB20554936BCF41093379EEF2F }}
